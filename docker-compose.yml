services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-invoiceapp}
      POSTGRES_USER: ${POSTGRES_USER:-invoiceuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-invoicepass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro,z
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-invoiceuser} -d ${POSTGRES_DB:-invoiceapp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-invoiceuser}:${POSTGRES_PASSWORD:-invoicepass}@db:5432/${POSTGRES_DB:-invoiceapp}
      PORT: 4000
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    volumes:
      - ./backend/src:/app/src:z
      - ./backend/eslint.config.mjs:/app/eslint.config.mjs:z
      - uploads:/app/uploads
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    command: node --watch src/index.js

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      VITE_API_TARGET: http://backend:4000
    volumes:
      - ./frontend/src:/app/src:z
      - ./frontend/index.html:/app/index.html:z
      - ./frontend/eslint.config.js:/app/eslint.config.js:z
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - db
    profiles:
      - tools

volumes:
  postgres_data:
  uploads:
